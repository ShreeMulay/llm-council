steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/llm-council/llm-council:$COMMIT_SHA'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/llm-council/llm-council:$COMMIT_SHA'

  # Resolve the pushed digest, then use the shared shadow/canary/rollback helper.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-euo'
      - 'pipefail'
      - '-c'
      - >-
        DIGEST=$$(gcloud artifacts docker images describe
        "us-central1-docker.pkg.dev/$PROJECT_ID/llm-council/llm-council:$COMMIT_SHA"
        --project="$PROJECT_ID" --format='value(image_summary.digest)') &&
        export PROJECT="$PROJECT_ID" REGION=us-central1 SERVICE=llm-council
        DEPLOY_REVISION="$COMMIT_SHA"
        ROLLOUT_OBSERVATION_SECONDS="${_ROLLOUT_OBSERVATION_SECONDS}"
        ROLLOUT_HEALTH_SAMPLES="${_ROLLOUT_HEALTH_SAMPLES}"
        ROLLOUT_SERVICE_HEALTH_SAMPLES="${_ROLLOUT_SERVICE_HEALTH_SAMPLES}"
        ROLLOUT_SMOKE_SAMPLES="${_ROLLOUT_SMOKE_SAMPLES}"
        ROLLOUT_STREAM_SMOKE_SAMPLES="${_ROLLOUT_STREAM_SMOKE_SAMPLES}"
        COUNCIL_MAX_LATENCY_SECONDS="${_COUNCIL_MAX_LATENCY_SECONDS}"
        COUNCIL_MAX_TOKENS="${_COUNCIL_MAX_TOKENS}"
        COUNCIL_MAX_COST_USD="${_COUNCIL_MAX_COST_USD}"
        COUNCIL_MAX_ERROR_RATE="${_COUNCIL_MAX_ERROR_RATE}"
        COUNCIL_MAX_QUALITY_DROP="${_COUNCIL_MAX_QUALITY_DROP}"
        COUNCIL_MAX_LATENCY_RATIO="${_COUNCIL_MAX_LATENCY_RATIO}"
        COUNCIL_MAX_COST_RATIO="${_COUNCIL_MAX_COST_RATIO}"
        COUNCIL_MIN_ROUTE_SUCCESS="${_COUNCIL_MIN_ROUTE_SUCCESS}"
        IMAGE_DIGEST="us-central1-docker.pkg.dev/$PROJECT_ID/llm-council/llm-council@$${DIGEST}" &&
        export DEPLOY_REVISION IMAGE_DIGEST ROLLOUT_OBSERVATION_SECONDS
        ROLLOUT_HEALTH_SAMPLES ROLLOUT_SERVICE_HEALTH_SAMPLES ROLLOUT_SMOKE_SAMPLES ROLLOUT_STREAM_SMOKE_SAMPLES
        COUNCIL_MAX_LATENCY_SECONDS
        COUNCIL_MAX_TOKENS COUNCIL_MAX_COST_USD COUNCIL_MAX_ERROR_RATE COUNCIL_MAX_QUALITY_DROP
        COUNCIL_MAX_LATENCY_RATIO COUNCIL_MAX_COST_RATIO COUNCIL_MIN_ROUTE_SUCCESS &&
        scripts/cloud_run_semantic_rollout.sh

substitutions:
  _ROLLOUT_OBSERVATION_SECONDS: '30'
  _ROLLOUT_HEALTH_SAMPLES: '1'
  _ROLLOUT_SERVICE_HEALTH_SAMPLES: '50'
  _ROLLOUT_SMOKE_SAMPLES: '5'
  _ROLLOUT_STREAM_SMOKE_SAMPLES: '5'
  _COUNCIL_MAX_LATENCY_SECONDS: '480'
  _COUNCIL_MAX_TOKENS: '60000'
  _COUNCIL_MAX_COST_USD: '1.50'
  _COUNCIL_MAX_ERROR_RATE: '0'
  _COUNCIL_MAX_QUALITY_DROP: '3'
  _COUNCIL_MAX_LATENCY_RATIO: '1.20'
  _COUNCIL_MAX_COST_RATIO: '1.25'
  _COUNCIL_MIN_ROUTE_SUCCESS: '0.99'

options:
  logging: CLOUD_LOGGING_ONLY

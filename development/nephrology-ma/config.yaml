# Nephrology M&A Intelligence Platform — Configuration
# All data source URLs, filter criteria, and scoring parameters

gcp:
  project_id: tke-ma-intelligence
  dataset: nephrology_ma
  location: US

# Nephrology filter codes
taxonomy_codes:
  - "207RN0300X"   # Internal Medicine — Nephrology
  - "2080N0001X"   # Pediatric Nephrology
  - "363LN0000X"   # Nurse Practitioner — Nephrology

medicare_specialty_codes:
  - "39"   # Nephrology
  - "17"   # Nephrology (alt code)

# Key HCPCS codes for nephrology utilization tracking
hcpcs_codes:
  dialysis:
    - "90935"  # Hemodialysis, one evaluation
    - "90937"  # Hemodialysis, repeated evaluation
    - "90945"  # Dialysis procedure other than HD, one eval
    - "90947"  # Dialysis procedure other than HD, repeated eval
  esrd_capitation:
    - "90957"  # ESRD monthly capitation (age-stratified)
    - "90958"
    - "90959"
    - "90960"
    - "90961"
    - "90962"
  esrd_home:
    - "90963"  # ESRD home dialysis monthly capitation
    - "90964"
    - "90965"
    - "90966"
  esrd_training:
    - "90967"
    - "90968"
    - "90969"
    - "90970"
  vascular_access:
    - "36800"
    - "36810"
    - "36815"
    - "36818"
    - "36819"
    - "36820"
    - "36821"
    - "36831"
    - "36832"
    - "36833"
    - "36861"
  kidney_procedures:
    - "50200"  # Renal biopsy
    - "50360"  # Renal transplant
    - "50365"  # Renal autotransplantation
  office_em:
    - "99202"
    - "99203"
    - "99204"
    - "99205"
    - "99211"
    - "99212"
    - "99213"
    - "99214"
    - "99215"
  hospital_em:
    - "99221"
    - "99222"
    - "99223"
    - "99231"
    - "99232"
    - "99233"
    - "99238"
    - "99239"

# Key nephrology drugs to track in Part D
nephrology_drugs:
  esa_anemia:
    - "EPOETIN ALFA"
    - "DARBEPOETIN ALFA"
    - "ROXADUSTAT"
  phosphate_binders:
    - "SEVELAMER"
    - "LANTHANUM"
    - "SUCROFERRIC OXYHYDROXIDE"
  ckd_related:
    - "SODIUM BICARBONATE"
    - "CALCITRIOL"
    - "CINACALCET"
    - "ETELCALCETIDE"
  immunosuppressants:
    - "TACROLIMUS"
    - "MYCOPHENOLATE"
    - "SIROLIMUS"
  sglt2_inhibitors:
    - "DAPAGLIFLOZIN"
    - "EMPAGLIFLOZIN"

# Geographic targeting
geography:
  primary_state: "TN"
  tke_service_cities:
    - "Nashville"
    - "Murfreesboro"
    - "Franklin"
    - "Hendersonville"
    - "Gallatin"
    - "Lebanon"
    - "Cookeville"
    - "Clarksville"
    - "Columbia"
    - "Smyrna"
    - "Brentwood"
    - "Spring Hill"
    - "Mount Juliet"
    - "La Vergne"
    - "Shelbyville"
    - "Tullahoma"
    - "McMinnville"
    - "Crossville"
  bordering_states:
    - "KY"
    - "VA"
    - "NC"
    - "GA"
    - "AL"
    - "MS"
    - "AR"
    - "MO"
  middle_tn_zip_prefix: "37"

# Scoring weights (10 dimensions, must sum to 1.0)
# Updated per LLM Council recommendations: added independence_likelihood,
# rebalanced weights to emphasize entity resolution signals
scoring:
  weights:
    estimated_age: 0.18
    solo_practice: 0.13
    volume_trend: 0.18
    prescribing_trend: 0.08
    open_payments_trend: 0.04
    license_status: 0.08
    business_filing_status: 0.04
    geographic_proximity: 0.09
    practice_value: 0.05
    independence_likelihood: 0.13
  tiers:
    HOT: 75
    WARM: 55
    WATCH: 35
    LOW: 0
  # Age estimation: graduation_year + avg_med_school_grad_age = approx birth year
  avg_med_school_grad_age: 26

# Data source URLs
data_sources:
  nppes:
    api: "https://npiregistry.cms.hhs.gov/api/"
    bulk_download: "https://download.cms.gov/nppes/NPI_Files.html"
    api_version: "2.1"
  physician_compare:
    dataset_id: "mj5m-pzi6"
    base_url: "https://data.cms.gov/provider-data/api/1/datastore/query/mj5m-pzi6/0"
  utilization:
    base_url: "https://data.cms.gov/provider-summary-by-type-of-service/medicare-physician-other-practitioners"
    # Dataset IDs by year (verify against CMS site before each run)
    datasets:
      2022: "fs4p-t5eq"
      2021: "mppp-yrgr"
      2020: "aah4-pdgf"
      2019: "jzd3-pt5g"
      2018: "mzr9-m72b"
  part_d:
    base_url: "https://data.cms.gov/provider-summary-by-type-of-service/medicare-part-d-prescribers"
  pecos:
    enrollment: "https://data.cms.gov/provider-characteristics/medicare-provider-supplier-enrollment/medicare-fee-for-service-public-provider-enrollment"
    reassignment: "https://data.cms.gov/provider-characteristics/medicare-provider-supplier-enrollment/physician-other-practitioner-reassignment"
  open_payments:
    api: "https://openpaymentsdata.cms.gov/api/1/datastore/query"
    bulk: "https://download.cms.gov/openpayments/"
  dialysis_compare:
    dataset_id: "23ew-n7w9"
    base_url: "https://data.cms.gov/provider-data/dataset/23ew-n7w9"
  cost_reports:
    # Council recommendation: add CMS Cost Reports Form 265-11
    base_url: "https://data.cms.gov/provider-compliance/cost-report"
    dialysis_form: "265-11"
  ma_enrollment:
    # Council recommendation: MA penetration adjustment
    base_url: "https://data.cms.gov/summary-statistics-on-beneficiary-enrollment/medicare-and-medicaid-reports"
  tn_sos:
    url: "https://tnbear.tn.gov/ECommerce/FilingSearch.aspx"
  tn_medical_board:
    url: "https://apps.health.tn.gov/Licensure/default.aspx"

# Pipeline schedule
schedule:
  full_refresh: "monthly"      # 1st of month, 2 AM
  scoring_refresh: "weekly"    # Monday, 6 AM
  job_monitoring: "daily"      # 8 AM
  signal_detection: "weekly"   # Monday, 6 AM (before scoring)

name: Deploy to Cloud Run

on:
  push:
    branches: [master]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'mcp/**'
      - '.beads/**'
      - 'openspec/**'

env:
  PROJECT_ID: tke-phi-privacy-engine
  REGION: us-central1
  SERVICE: llm-council
  REGISTRY: us-central1-docker.pkg.dev/tke-phi-privacy-engine/llm-council/llm-council

jobs:
  ci:
    name: CI Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint with ruff
        run: uv run ruff check backend/ tests/

      - name: Test
        run: uv run pytest -m "not slow and not e2e"

      # Verify Dockerfile builds before attempting deploy (catches broken deps early)
      - name: Build Docker image (verification)
        run: docker build -t ${{ env.REGISTRY }}:ci .

  deploy:
    name: Deploy
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1080132293876/locations/global/workloadIdentityPools/github-actions/providers/github-provider
          service_account: llm-council-deployer@tke-phi-privacy-engine.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build -t ${{ env.REGISTRY }}:${{ github.sha }} -t ${{ env.REGISTRY }}:latest .
          docker push ${{ env.REGISTRY }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.REGISTRY }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --port=8800 \
            --timeout=1800 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=1 \
            --max-instances=2 \
            --allow-unauthenticated \
            --set-secrets=OPENROUTER_API_KEY=llm-council-openrouter-key:latest,ANTHROPIC_API_KEY=llm-council-anthropic-key:latest,FIREWORKS_API_KEY=llm-council-fireworks-key:latest,GROK_API_KEY=llm-council-grok-key:latest,COUNCIL_API_KEY=llm-council-api-key:latest \
            --quiet

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} --region=${{ env.REGION }} --format='value(status.url)')
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health")
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
          echo "Deployment verified: $URL/health returned 200"

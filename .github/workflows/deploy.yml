name: Deploy to Cloud Run

on:
  workflow_dispatch:
    inputs:
      approved_forgejo_sha:
        description: Full approved Forgejo master SHA
        required: true
        type: string
      prior_paid_attempts:
        description: Fixed cumulative paid attempts (0 fresh, 2 approved resume)
        required: true
        default: "0"
        type: choice
        options:
          - "0"
          - "2"
      rollout_mode:
        description: Exact rollout authorization mode
        required: true
        default: fresh
        type: choice
        options:
          - fresh
          - resume-after-prior-v1
      resume_manifest_uri:
        description: Immutable approved GCS resume manifest URI (resume only)
        required: false
        type: string
      resume_manifest_generation:
        description: Exact GCS resume manifest generation (resume only)
        required: false
        type: string

env:
  PROJECT_ID: tke-phi-privacy-engine
  REGION: us-central1
  SERVICE: llm-council

jobs:
  ci:
    name: CI Gate
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.approved_forgejo_sha }}
          fetch-depth: 0

      - name: Bind checkout to exact Forgejo master
        env:
          APPROVED_FORGEJO_SHA: ${{ inputs.approved_forgejo_sha }}
        run: |
          [[ "$APPROVED_FORGEJO_SHA" =~ ^[0-9a-f]{40}$ ]]
          git remote add forgejo https://git.thekidneyexperts.com/thekidneyexperts/llm-council.git
          git fetch forgejo master
          test "$(git rev-parse HEAD)" = "$APPROVED_FORGEJO_SHA"
          test "$(git rev-parse forgejo/master)" = "$APPROVED_FORGEJO_SHA"

      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync --extra test

      - name: Lint with ruff
        run: uv run ruff check backend/ tests/

      - name: Test
        run: uv run pytest -m "not slow and not e2e"

  deploy:
    name: Deploy
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.approved_forgejo_sha }}
          fetch-depth: 0

      - name: Bind checkout to exact Forgejo master
        env:
          APPROVED_FORGEJO_SHA: ${{ inputs.approved_forgejo_sha }}
        run: |
          [[ "$APPROVED_FORGEJO_SHA" =~ ^[0-9a-f]{40}$ ]]
          git remote add forgejo https://git.thekidneyexperts.com/thekidneyexperts/llm-council.git
          git fetch forgejo master
          test "$(git rev-parse HEAD)" = "$APPROVED_FORGEJO_SHA"
          test "$(git rev-parse forgejo/master)" = "$APPROVED_FORGEJO_SHA"

      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1080132293876/locations/global/workloadIdentityPools/github-actions/providers/github-provider
          service_account: llm-council-deployer@tke-phi-privacy-engine.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Execute sole bounded deployment entry point
        env:
          DEPLOY_ENTRYPOINT_MODE: github
          APPROVED_FORGEJO_SHA: ${{ inputs.approved_forgejo_sha }}
          ROLLOUT_PRIOR_PAID_ATTEMPTS: ${{ inputs.prior_paid_attempts }}
          ROLLOUT_MODE: ${{ inputs.rollout_mode }}
          ROLLOUT_RESUME_MANIFEST_URI: ${{ inputs.resume_manifest_uri }}
          ROLLOUT_RESUME_MANIFEST_GENERATION: ${{ inputs.resume_manifest_generation }}
        run: scripts/deploy.sh

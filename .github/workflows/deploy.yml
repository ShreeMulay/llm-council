name: Deploy to Cloud Run

on:
  push:
    branches: [master]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'mcp/**'
      - '.beads/**'
      - 'openspec/**'

env:
  PROJECT_ID: tke-phi-privacy-engine
  REGION: us-central1
  SERVICE: llm-council
  REGISTRY: us-central1-docker.pkg.dev/tke-phi-privacy-engine/llm-council/llm-council
  ROLLOUT_OBSERVATION_SECONDS: '30'
  ROLLOUT_HEALTH_SAMPLES: '1'
  ROLLOUT_SERVICE_HEALTH_SAMPLES: '50'
  ROLLOUT_SMOKE_SAMPLES: '5'
  ROLLOUT_STREAM_SMOKE_SAMPLES: '5'
  COUNCIL_MAX_LATENCY_SECONDS: '480'
  COUNCIL_MAX_TOKENS: '60000'
  COUNCIL_MAX_COST_USD: '1.50'
  COUNCIL_MAX_ERROR_RATE: '0'
  COUNCIL_MAX_QUALITY_DROP: '3'
  COUNCIL_MAX_LATENCY_RATIO: '1.20'
  COUNCIL_MAX_COST_RATIO: '1.25'
  COUNCIL_MIN_ROUTE_SUCCESS: '0.99'

jobs:
  ci:
    name: CI Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint with ruff
        run: uv run ruff check backend/ tests/

      - name: Test
        run: uv run pytest -m "not slow and not e2e"

  deploy:
    name: Deploy
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1080132293876/locations/global/workloadIdentityPools/github-actions/providers/github-provider
          service_account: llm-council-deployer@tke-phi-privacy-engine.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push image once
        run: |
          docker build -t ${{ env.REGISTRY }}:${{ github.sha }} .
          docker push ${{ env.REGISTRY }}:${{ github.sha }}
          DIGEST=$(gcloud artifacts docker images describe \
            ${{ env.REGISTRY }}:${{ github.sha }} \
            --project=${{ env.PROJECT_ID }} \
            --format='value(image_summary.digest)')
          echo "IMAGE_DIGEST=${{ env.REGISTRY }}@${DIGEST}" >> "$GITHUB_ENV"

      - name: Semantic canary rollout
        env:
          PROJECT: ${{ env.PROJECT_ID }}
          DEPLOY_REVISION: ${{ github.sha }}
        run: scripts/cloud_run_semantic_rollout.sh

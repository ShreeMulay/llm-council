name: Deploy to Cloud Run

on:
  workflow_dispatch:
    inputs:
      approved_forgejo_sha:
        description: Full approved Forgejo master SHA
        required: true
        type: string

env:
  PROJECT_ID: tke-phi-privacy-engine
  REGION: us-central1
  SERVICE: llm-council

jobs:
  ci:
    name: CI Gate
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.approved_forgejo_sha }}
          fetch-depth: 0

      - name: Bind checkout to exact Forgejo master
        env:
          APPROVED_FORGEJO_SHA: ${{ inputs.approved_forgejo_sha }}
        run: |
          [[ "$APPROVED_FORGEJO_SHA" =~ ^[0-9a-f]{40}$ ]]
          git remote add forgejo https://git.thekidneyexperts.com/thekidneyexperts/llm-council.git
          git fetch forgejo master
          test "$(git rev-parse HEAD)" = "$APPROVED_FORGEJO_SHA"
          test "$(git rev-parse forgejo/master)" = "$APPROVED_FORGEJO_SHA"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint with ruff
        run: uv run ruff check backend/ tests/

      - name: Test
        run: uv run pytest -m "not slow and not e2e"

  deploy:
    name: Deploy
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.approved_forgejo_sha }}
          fetch-depth: 0

      - name: Bind checkout to exact Forgejo master
        env:
          APPROVED_FORGEJO_SHA: ${{ inputs.approved_forgejo_sha }}
        run: |
          [[ "$APPROVED_FORGEJO_SHA" =~ ^[0-9a-f]{40}$ ]]
          git remote add forgejo https://git.thekidneyexperts.com/thekidneyexperts/llm-council.git
          git fetch forgejo master
          test "$(git rev-parse HEAD)" = "$APPROVED_FORGEJO_SHA"
          test "$(git rev-parse forgejo/master)" = "$APPROVED_FORGEJO_SHA"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1080132293876/locations/global/workloadIdentityPools/github-actions/providers/github-provider
          service_account: llm-council-deployer@tke-phi-privacy-engine.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Execute sole bounded deployment entry point
        env:
          DEPLOY_ENTRYPOINT_MODE: github
          APPROVED_FORGEJO_SHA: ${{ inputs.approved_forgejo_sha }}
        run: scripts/deploy.sh

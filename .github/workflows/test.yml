name: Tests

on:
  push:
    branches: [master, main, 'feature/**']
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'mcp/**'
      - '.beads/**'
      - 'openspec/**'
  pull_request:
    branches: [master, main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'mcp/**'
      - '.beads/**'
      - 'openspec/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --cov=backend --cov-report=xml --cov-report=term -m "not slow and not e2e"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Check coverage threshold
        run: |
          python -m pytest tests/ --cov=backend --cov-report=term-missing -m "not slow and not e2e" --cov-fail-under=80
